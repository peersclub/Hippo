<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KoinBX Pro — host demo (Hippo embed)</title>
<style>
  /* Deliberately plain host styles — the SDK must never depend on or disturb them. */
  :root{--bg:#0E1014;--panel:#14161C;--hairline:rgba(255,255,255,.07);--ink:#E9EBF0;--dim:#8A8F9C;--down:#FF8585;--up:#2EC48D}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:system-ui,sans-serif;height:100vh;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:22px;padding:0 18px;height:52px;border-bottom:1px solid var(--hairline);background:var(--panel);flex-shrink:0}
  .logo{font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px}
  .logo .dot{width:22px;height:22px;border-radius:7px;background:#F0B94A;color:#15171D;display:grid;place-items:center;font-size:11px}
  nav{display:flex;gap:18px;font-size:12.5px;color:var(--dim)}
  nav .on{color:var(--ink);font-weight:600}
  .pair{margin-left:auto;display:flex;align-items:center;gap:14px;font-family:ui-monospace,monospace;font-size:12px}
  .pair .px{color:var(--down);font-size:14px;font-weight:600}
  main{display:flex;flex:1;min-height:0}
  .chart{flex:1;position:relative;border-right:1px solid var(--hairline)}
  .chart svg{position:absolute;inset:0;width:100%;height:100%}
  .book{width:230px;flex-shrink:0;font-family:ui-monospace,monospace;font-size:11px;padding-top:8px}
  .book h5{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);padding:6px 14px}
  .brow{display:flex;justify-content:space-between;padding:3.5px 14px}
  .brow.ask span:first-child{color:var(--down)}
  .brow.bid span:first-child{color:var(--up)}
  .brow span:last-child{color:var(--dim)}
  .mid{font-size:14px;font-weight:600;color:var(--down);padding:8px 14px;border-top:1px solid var(--hairline);border-bottom:1px solid var(--hairline)}
</style>
</head>
<body>
  <header>
    <div class="logo"><span class="dot">K</span>KoinBX <span style="font-weight:400;color:var(--dim);font-size:11px">Pro</span></div>
    <nav><span class="on">Trade</span><span>Markets</span><span>Portfolio</span><span>Earn</span></nav>
    <div class="pair"><span style="font-weight:600">BTC/USDT</span><span class="px">61,240.00</span><span style="color:var(--down)">−4.2%</span></div>
  </header>
  <main>
    <div class="chart"><svg id="candles" aria-hidden="true" preserveAspectRatio="none"></svg></div>
    <div class="book">
      <h5>Order book</h5>
      <div id="asks"></div>
      <div class="mid">61,240.00</div>
      <div id="bids"></div>
    </div>
  </main>

  <script>
    // Host page's own scripts — noise the SDK must coexist with.
    const svg = document.getElementById('candles')
    const W = 1000, H = 600
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`)
    let px = 300
    let seed = 42
    const rnd = () => {
      seed = (seed * 9301 + 49297) % 233280
      return seed / 233280
    }
    for (let i = 0; i < 60; i++) {
      const o = px, c = px + (rnd() - 0.55) * 40
      const hi = Math.max(o, c) + rnd() * 14, lo = Math.min(o, c) - rnd() * 14
      const x = 20 + i * 16, up = c < o
      svg.insertAdjacentHTML('beforeend',
        `<line x1="${x + 4}" y1="${H - hi}" x2="${x + 4}" y2="${H - lo}" stroke="${up ? '#2EC48D' : '#FF8585'}" stroke-width="1"/>` +
        `<rect x="${x}" y="${H - Math.max(o, c)}" width="8" height="${Math.max(2, Math.abs(o - c))}" fill="${up ? '#2EC48D' : '#FF8585'}" opacity=".85"/>`)
      px = c
    }
    const asks = document.getElementById('asks'), bids = document.getElementById('bids')
    for (let i = 0; i < 8; i++) {
      asks.insertAdjacentHTML('beforeend', `<div class="brow ask"><span>${(61240 + (8 - i) * 12).toLocaleString()}</span><span>${(rnd() * 2).toFixed(3)}</span></div>`)
      bids.insertAdjacentHTML('beforeend', `<div class="brow bid"><span>${(61240 - (i + 1) * 12).toLocaleString()}</span><span>${(rnd() * 2).toFixed(3)}</span></div>`)
    }
  </script>

  <!-- ═══ The Hippo embed — the entire partner-side integration ═══
       The REAL gateway (:8788) is the default so the plain URL demos the
       full product; ?gw=mock flips to the scripted mock (:8787) for offline
       or zero-cost runs. A partner ships the single static <script> tag;
       the dynamic injection here exists only so demos can flip gateways. -->
  <script>
    (() => {
      const real = new URLSearchParams(location.search).get('gw') !== 'mock'
      // Cloud builds bake the gateway in via VITE_GATEWAY_URL (Vite replaces
      // %VITE_GATEWAY_URL% in HTML at build time); unset = local dev ports.
      const envGw = '%VITE_GATEWAY_URL%'
      const realGw = envGw.startsWith('http') ? envGw : 'http://localhost:8788'
      const s = document.createElement('script')
      s.src = '/loader.js'
      s.async = true
      s.dataset.hippoKey = 'pk_demo'
      s.dataset.hippoGateway = real ? realGw : 'http://localhost:8787'
      document.body.appendChild(s)

      // Tiny badge so it's always unambiguous which gateway a demo is on,
      // plus quick links to the test guide and operator panel.
      const bar = document.createElement('div')
      bar.style.cssText =
        'position:fixed;left:10px;bottom:10px;z-index:2147483001;display:flex;gap:6px;' +
        'font:600 10px ui-monospace,monospace;letter-spacing:.08em'
      const badge = document.createElement('span')
      badge.textContent = `GW: ${real ? 'REAL' : 'MOCK'}`
      badge.style.cssText =
        'padding:3px 8px;border:1px solid rgba(255,255,255,.14);border-radius:5px;' +
        `background:${real ? 'rgba(46,196,141,.16)' : 'rgba(255,255,255,.05)'};` +
        `color:${real ? '#2EC48D' : '#8A8F9C'}`
      bar.appendChild(badge)
      for (const [label, href] of [
        ['HOW TO TEST', '/how'],
        ['ADMIN', 'http://localhost:5175/'],
      ]) {
        const a = document.createElement('a')
        a.textContent = label
        a.href = href
        a.target = '_blank'
        a.style.cssText =
          'padding:3px 8px;border:1px solid rgba(255,255,255,.14);border-radius:5px;' +
          'background:rgba(255,255,255,.05);color:#8A8F9C;text-decoration:none'
        bar.appendChild(a)
      }
      document.body.appendChild(bar)
    })()
  </script>
</body>
</html>
